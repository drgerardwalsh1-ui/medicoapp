name: _nlp
on:
  workflow_call:
    inputs:
      container: { type: string, required: true }
permissions:
  contents: read
  packages: read
env:
  CI: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
jobs:
  nlp:
    runs-on: ubuntu-latest
    container: ${{ inputs.container != '' && inputs.container || null }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Forbid unpinned/host execution
        if: ${{ inputs.container == '' || !contains(inputs.container, '@sha256:') }}
        run: echo "nlp must run in a digest-pinned container" && exit 1
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Verify pinned NLP model digest
        shell: bash
        run: |
          EXPECTED=$(cat backend/src-tauri/nlp/model.lock)
          ACTUAL=$(sha256sum backend/src-tauri/nlp/model.manifest | awk '{print $1}')
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "NLP model not pinned"; exit 1; }
      - name: Hash-locked Python install
        run: pip install --require-hashes --no-deps -r backend/src-tauri/nlp/requirements.txt
      - name: Lockfile-only Node install
        run: npm ci
      - name: NLP service contract + determinism (advisory)
        run: npx vitest run tests/contracts/nlp
      - name: No-silent-mutation
        run: git diff --exit-code
