name: builder-image
on:
  schedule: [{ cron: "0 2 * * 1" }]
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: builder-image
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write, id-token: write, attestations: write }
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/ci-builder
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Registry login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build + push (digest captured)
        id: build
        shell: bash
        run: |
          docker buildx create --use
          docker buildx build \
            --file .github/docker/ci-builder.Dockerfile \
            --tag "$IMAGE:latest" --provenance=true --sbom=true \
            --push --metadata-file meta.json .
          DIGEST=$(python3 -c 'import json;print(json.load(open("meta.json"))["containerimage.digest"])')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest image provenance (SLSA)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with: { subject-name: "${{ env.IMAGE }}", subject-digest: "${{ steps.build.outputs.digest }}", push-to-registry: true }
      - name: Emit pinned reference
        run: echo "Update .github/ci-builder-image (reviewed PR) to ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
