name: _integrity
on:
  workflow_call:
    inputs:
      container: { type: string, required: true }
permissions:
  contents: read
  pull-requests: read
jobs:
  integrity:
    runs-on: ubuntu-latest
    container: ${{ inputs.container != '' && inputs.container || null }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Forbid unpinned/host execution
        if: ${{ inputs.container == '' || !contains(inputs.container, '@sha256:') }}
        run: echo "integrity must run in a digest-pinned container" && exit 1
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch base ref (scoped, non-persisted token)
        if: github.event_name == 'pull_request'
        run: |
          git -c http.extraheader="AUTHORIZATION: bearer ${{ github.token }}" fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: Node lockfile-only install
        run: npm ci
      - name: Node lockfile drift
        run: git diff --exit-code -- package-lock.json
      - name: Rust fetch (locked)
        run: cargo fetch --locked
        working-directory: backend/src-tauri
      - name: Rust lockfile drift
        run: git diff --exit-code -- backend/src-tauri/Cargo.lock
      - name: Regenerate /shared from Rust
        run: cargo run --locked --frozen -p xtask -- generate-ipc
        working-directory: backend/src-tauri
      - name: /shared drift (tamper detection)
        run: git diff --exit-code -- shared
      - name: Global no-silent-mutation
        run: git diff --exit-code
      - name: Detect clinical-truth changes
        if: github.event_name == 'pull_request'
        id: snap
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- \
            'tests/clinical-truth/snapshots/**' 'tests/clinical-truth/report-output/**' \
            'tests/clinical-truth/fixtures/**' 'backend/src-tauri/**/snapshots/**' || true)
          [ -n "$CHANGED" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
      - name: Enforce clinical-signoff label
        if: github.event_name == 'pull_request' && steps.snap.outputs.changed == 'true' && !contains(github.event.pull_request.labels.*.name, 'clinical-signoff')
        run: echo "Clinical-truth change without 'clinical-signoff' label" && exit 1
