name: nightly
on:
  schedule: [{ cron: "0 3 * * *" }]
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      image: ${{ steps.pin.outputs.image }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - id: pin
        shell: bash
        run: |
          IMG=$(grep -vE '^[[:space:]]*#' .github/ci-builder-image | grep -m1 '@sha256:' | tr -d '[:space:]')
          EXPECT="ghcr.io/${{ github.repository_owner }}/ci-builder@sha256:"
          case "$IMG" in "${EXPECT}"*) : ;; *) echo "bad pin"; exit 1 ;; esac
          gh attestation verify "oci://$IMG" --repo "$GITHUB_REPOSITORY"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
  rust:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(format('[{{"os":"ubuntu-latest","container":"{0}","scanners":true}},{{"os":"windows-latest","container":"","scanners":false}},{{"os":"macos-latest","container":"","scanners":false}}]', needs.prepare.outputs.image)) }}
    uses: ./.github/workflows/_rust.yml
    with: { os: "${{ matrix.os }}", container: "${{ matrix.container }}", run-scanners: "${{ matrix.scanners }}" }
    permissions: { contents: read, packages: read }
  clinical:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(format('[{{"os":"ubuntu-latest","container":"{0}"}},{{"os":"windows-latest","container":""}},{{"os":"macos-latest","container":""}}]', needs.prepare.outputs.image)) }}
    uses: ./.github/workflows/_clinical-truth.yml
    with: { os: "${{ matrix.os }}", container: "${{ matrix.container }}" }
    permissions: { contents: read, packages: read }
  full-codeql:
    runs-on: ubuntu-latest
    permissions: { contents: read, actions: read }
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, rust]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: github/codeql-action/init@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with: { languages: "${{ matrix.language }}", queries: security-extended }
      - if: matrix.language == 'rust'
        run: cargo build --locked
        working-directory: backend/src-tauri
      - uses: github/codeql-action/analyze@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with: { category: "/language:${{ matrix.language }}", upload: never, output: "${{ runner.temp }}/sarif" }
      - name: Gate on HIGH+ (fail closed on empty)
        shell: python
        run: |
          import json, glob, os, sys
          files = glob.glob(os.path.join(os.environ["RUNNER_TEMP"], "sarif", "**", "*.sarif"), recursive=True)
          if not files: print("no SARIF"); sys.exit(1)
          hi = 0; meta = False
          for f in files:
              d = json.load(open(f))
              for run in d.get("runs", []):
                  sev = {}
                  for t in [run.get("tool", {}).get("driver", {})] + run.get("tool", {}).get("extensions", []):
                      for r in t.get("rules", []):
                          s = r.get("properties", {}).get("security-severity")
                          if s is not None:
                              meta = True
                              try: sev[r["id"]] = float(s)
                              except ValueError: pass
                  for res in run.get("results", []):
                      s = res.get("properties", {}).get("security-severity")
                      v = float(s) if s is not None else sev.get(res.get("ruleId"), 0.0)
                      if v >= 7.0: hi += 1
          if not meta: print("no severity metadata"); sys.exit(1)
          sys.exit(1 if hi else 0)
  e2e:
    needs: [prepare]
    uses: ./.github/workflows/_e2e-smoke.yml
    permissions: { contents: read }
  visual:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: "20" }
      - run: npm ci
      - run: npm run build-storybook --workspace frontend
      - run: npx vitest run tests/visual
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with: { name: "visual-diff-${{ github.sha }}", path: tests/visual/__diff__, if-no-files-found: ignore, overwrite: false, retention-days: 30 }
