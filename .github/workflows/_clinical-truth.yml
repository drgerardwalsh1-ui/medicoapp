name: _clinical-truth
on:
  workflow_call:
    inputs:
      os: { type: string, required: true }
      container: { type: string, default: "" }
permissions:
  contents: read
  packages: read
env:
  CI: "true"
  INSTA_UPDATE: "no"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
jobs:
  clinical-truth:
    runs-on: ${{ inputs.os }}
    container: ${{ inputs.container != '' && inputs.container || null }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Forbid silent host fallback on Linux
        if: inputs.os == 'ubuntu-latest' && inputs.container == ''
        run: echo "Linux must run in the pinned CI builder image" && exit 1
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Toolchain (host legs only)
        if: inputs.container == ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cargo cache (host legs only)
        if: inputs.container == ''
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with: { workspaces: backend/src-tauri }
      - name: Node (host legs only)
        if: inputs.container == ''
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: "20" }
      - name: Lockfile-only install
        run: npm ci
      - name: Rust golden-master replay (locked+frozen)
        run: cargo test --workspace --locked --frozen --features clinical-truth
        working-directory: backend/src-tauri
      - name: DSM/PIRS/timeline/causation invariants
        run: npx vitest run tests/clinical-truth/diagnostics
      - name: TS to Rust equivalence
        run: npx vitest run tests/clinical-truth/equivalence
      - name: DOCX/PDF report-output fidelity
        run: npx vitest run tests/clinical-truth/report-output
      - name: No-silent-mutation
        run: git diff --exit-code
