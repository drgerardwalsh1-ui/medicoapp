name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
jobs:
  pre-release-e2e:
    uses: ./.github/workflows/_e2e-smoke.yml
    permissions: { contents: read }
  build-and-attest:
    needs: [pre-release-e2e]
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write, attestations: write }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: true }
      - name: Enforce tagged commit is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || { echo "Release tag is not an ancestor of main"; exit 1; }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with: { workspaces: backend/src-tauri }
      - run: npm ci
      - run: npm run build --workspace frontend
      - run: cargo fetch --locked
        working-directory: backend/src-tauri
      - run: cargo build --release --locked
        working-directory: backend/src-tauri
      - name: Assemble artifacts + checksums (commit-traceable)
        shell: bash
        run: |
          mkdir -p dist-release
          cp -r frontend/dist dist-release/frontend-dist
          find backend/src-tauri/target/release -type f \
            \( -name '*.app' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name 'medicolegaltemplate*' -o -name 'backend' \) \
            -exec cp {} dist-release/ \;
          test -n "$(find dist-release -type f \( -name '*.app' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name 'medicolegaltemplate*' -o -name 'backend' \))" \
            || { echo 'no release binary collected'; exit 1; }
          echo "${{ github.sha }}" > dist-release/COMMIT_SHA
          ( cd dist-release && find . -type f ! -name SHA256SUMS -exec sha256sum {} \; > SHA256SUMS )
      - uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with: { subject-path: "dist-release/**" }
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with: { name: "release-${{ github.sha }}", path: dist-release, if-no-files-found: error, overwrite: false, retention-days: 90 }
  publish:
    needs: [build-and-attest]
    runs-on: ubuntu-latest
    environment: macos-release-gate
    permissions: { contents: read, attestations: read }
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with: { name: "release-${{ github.sha }}", path: dist-release }
      - name: Verify SLSA provenance before promotion
        run: |
          find dist-release -type f ! -name SHA256SUMS ! -name COMMIT_SHA -print0 \
          | while IFS= read -r -d '' f; do
              gh attestation verify "$f" --repo "$GITHUB_REPOSITORY" || exit 1
            done
      - name: Verify checksums + commit traceability
        run: |
          ( cd dist-release && sha256sum -c SHA256SUMS )
          [ "$(cat dist-release/COMMIT_SHA)" = "${{ github.sha }}" ] || { echo "commit mismatch"; exit 1; }
      - name: Promote release
        run: echo "Provenance-verified, on-main, human-gated release ${{ github.ref_name }}"
