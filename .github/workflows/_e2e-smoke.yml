name: _e2e-smoke
on:
  workflow_call: {}
permissions:
  contents: read
env:
  CI: "true"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # never macOS (tauri-driver unsupported)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with: { workspaces: backend/src-tauri }
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: "20" }
      - name: Linux WebKitGTK + driver deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev webkit2gtk-driver xvfb
      - name: Lockfile-only install
        run: npm ci
      - name: Build frontend
        run: npm run build --workspace frontend
      - name: Fetch Rust dependencies (locked)
        run: cargo fetch --locked
        working-directory: backend/src-tauri
      - name: Build Tauri release binary (locked)
        run: cargo build --release --locked
        working-directory: backend/src-tauri
      - name: Install tauri-driver (locked)
        run: cargo install --locked tauri-driver
      - name: Real-shell smoke (WebdriverIO + tauri-driver)
        run: npx wdio run tests/e2e/wdio.conf.ts
